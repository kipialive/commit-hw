###### ###### ###### ###### ###### ######
### **Create Sealed-Secret** ###
###### ###### ###### ###### ###### ######

cd ~/HW/commit-hw/.github/helm-charts/env-dev/cert-manager/templates/

kubectl create secret generic cloudflare-api-token-secret \
  --namespace cert-manager \
  --from-literal=api-token='<PASTE_CLOUDFLARE_API_TOKEN_HERE>' \
  --dry-run=client \
  -o yaml > cloudflare-api-token-secret.yaml

kubeseal \
  --format yaml \
  --cert ~/HW/commit-hw/.github/helm-charts/env-dev/traefik-reverse-proxy/scripts/public.pem \
  < cloudflare-api-token-secret.yaml \
  > ./sealedsecret-cloudflare-api-token.yaml

rm ./cloudflare-api-token-secret.yaml

# Validation
rg "name: cloudflare-api-token-secret|namespace: cert-manager" \
  ~/HW/commit-hw/.github/helm-charts/env-dev/cert-manager/templates/sealedsecret-cloudflare-api-token.yaml

