###### ###### ###### ###### ###### ######
### **Create Sealed-Secret** ###
###### ###### ###### ###### ###### ######
cd ~/HW/commit-hw/.github/helm-charts/env-dev/traefik-reverse-proxy/scripts

gcloud container clusters get-credentials commit-dev-gke-cluster --region us-central1 --project supple-lock-502820-g3
kubectx commint-hw-dev-gke-cluster=gke_supple-lock-502820-g3_us-central1_commit-dev-gke-cluster

# This part already done during traefik installation #
kubectl get secret -n kube-system \
--selector=sealedsecrets.bitnami.com/sealed-secrets-key=active \
-o jsonpath="{.items[0].data['tls\.crt']}" | base64 --decode > public.pem

###### ###### ###### ######
# traefik-dashboard-basicauth-secret.yaml
###### ###### ###### ######
cat << EOF > traefik-dashboard-basicauth-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: traefik-dashboard-basicauth
  namespace: traefik-reverse-proxy
type: Opaque
data:
#   echo -n "$(htpasswd -nbB admin '<your_super_password>')" | base64  ### use for to generate 'admin:{SHA}...')
  users: |-
    Y**************************************************t
EOF
###### ###### ###### ######
[v] kubeseal --format yaml --cert ~/HW/commit-hw/.github/helm-charts/env-dev/traefik-reverse-proxy/scripts/public.pem --scope=cluster-wide < traefik-dashboard-basicauth-secret.yaml > ~/HW/commit-hw/.github/helm-charts/env-dev/traefik-reverse-proxy/traefik/templates/middlewares/sealedsecret-traefik-dashboard.yaml

[v] ll ~/HW/commit-hw/.github/helm-charts/env-dev/traefik-reverse-proxy/traefik/templates/middlewares/

[v] rm -rf ./traefik-dashboard-basicauth-secret.yaml










