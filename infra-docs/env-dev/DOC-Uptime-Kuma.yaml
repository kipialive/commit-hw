##### ##### ##### ##### ##### ##### ##### #####
### Architecture ###
##### ##### ##### ##### ##### ##### ##### #####

# Uptime Kuma runs inside the cluster as a single-replica Deployment.
# It monitors all *.dev.cloudsmesh.be endpoints via HTTP/HTTPS probes from within the cluster,
# catching Traefik routing, DNS resolution, and TLS certificate issues.

##### ##### ##### ##### ##### ##### ##### #####
### Status ###
##### ##### ##### ##### ##### ##### ##### #####

