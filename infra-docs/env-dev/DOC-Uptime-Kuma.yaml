##### ##### ##### ##### ##### ##### ##### #####
### Troubleshooting ###
##### ##### ##### ##### ##### ##### ##### #####

# Problem: Pod stuck in Pending
# Cause: PVC not provisioning (StorageClass missing or GKE Persistent Disk CSI issue)
# Fix: kubectl describe pvc -n monitoring uptime-kuma → check events

# Problem: Web UI shows 404 or 503
# Cause: IngressRoute not deployed or service name mismatch
# Fix: kubectl get ingressroute -n traefik-reverse-proxy uptime-kuma -o yaml
#       → verify service name = "uptime-kuma", port = 3001, namespace = "monitoring"

# Problem: Telegram notifications not working
# Cause: Bot token not configured in Uptime Kuma Web UI
# Fix: Settings → Notifications → Add Telegram → paste bot token and chat ID
#      (reuse @jit_access_portal_bot token and chat from Alertmanager setup)

# Problem: Monitors show DOWN from inside cluster but services work externally
# Cause: DNS resolution or Traefik routing issue within the cluster
# Fix: kubectl exec -n monitoring <pod> -- wget -qO- --timeout=5 https://<endpoint>/ 2>&1
#      → check DNS resolution and certificate errors

