## .github/helm-charts/env-dev/traefik-reverse-proxy/traefik/templates/ingressroutes/ingressroute-traefik-dashboard.yaml
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: traefik-reverse-proxy
spec:
  entryPoints:
    # - traefik
    # - web
    - websecure
  tls:
    secretName: dev-devops-wildcard-tls
  routes:
    # Dashboard UI
    # - match: Host(`traefik-dashboard.dev.devops.cloudsmesh.be`) && (PathPrefix(`/dashboard`))
    - match: Host(`traefik-dashboard.dev.devops.cloudsmesh.be`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))
      kind: Rule
      middlewares:
        - name: traefik-dashboard-auth
          namespace: traefik-reverse-proxy
      services:
        - name: api@internal
          kind: TraefikService
    
