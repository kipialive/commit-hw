## ClusterIssuer for Let's Encrypt production (DNS-01 via Route53)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.clusterIssuer.name }}
spec:
  acme:
    email: {{ .Values.clusterIssuer.email }}
    server: {{ .Values.clusterIssuer.server }}
    privateKeySecretRef:
      name: {{ .Values.clusterIssuer.privateKeySecret }}
    solvers:
      - dns01:
          route53:
            region: {{ .Values.clusterIssuer.solver.dns01.region }}
            hostedZoneID: {{ .Values.clusterIssuer.solver.dns01.hostedZoneID }}
