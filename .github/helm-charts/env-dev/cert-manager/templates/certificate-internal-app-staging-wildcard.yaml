{{- with .Values.certificates.devWildcardStaging }}
{{- if .enabled }}
---
## Staging Let's Encrypt wildcard certificate for private dev platform apps.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .name }}
  namespace: {{ .namespace }}
spec:
  secretName: {{ .secretName }}
  privateKey:
    rotationPolicy: Always
  issuerRef:
    name: {{ .issuerRefName }}
    kind: ClusterIssuer
  dnsNames:
    {{- range .dnsNames }}
    - {{ . | quote }}
    {{- end }}
{{- end }}
{{- end }}
