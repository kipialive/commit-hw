## .github/workflows/env-dev--installation-uptime-kuma.yaml
###### ###### ###### ###### ###### ###### ###### ###### ###### ######
### NOTE ### This GitLab CI job installs Uptime Kuma on the GKE cluster.
### Uptime Kuma monitors HTTP/HTTPS endpoints for all *.dev.cloudsmesh.be services.
### Built-in Telegram notifications reuse @jit_access_portal_bot.
### Web UI: https://uptime.dev.cloudsmesh.be (Forward Auth SSO)
###### ###### ###### ###### ###### ###### ###### ###### ###### ######
# ------------------------------
# Global variables (GitLab CI)
# ------------------------------
variables:
  ENVIRONMENT: "develop"
  AWS_ACCOUNT_ID: "${KEYPER_AWS_ACCOUNT_ID}"
  AWS_REGION: "${KEYPER_AWS_REGION}"
  AWS_ROLE_ARN: "arn:aws:iam::${KEYPER_AWS_ACCOUNT_ID}:role/dcentralab-keyper-GitLabCIRole"
  GKE_NAME: "k8s-jit-eks-02"

  UPTIME_KUMA_NAMESPACE: monitoring
  HELM_FOLDER: "helm-charts/env-jit"

  UPTIME_KUMA_RELEASE_NAME: "uptime-kuma"
  UPTIME_KUMA_CHART_VERSION: "2.24.0"

# ----------------------------------------------------------
# Install Uptime Kuma
# ----------------------------------------------------------
installation-uptime-kuma:
  stage: deploy-uptime-kuma
  rules:
    - if: $CI_COMMIT_BRANCH == "traefik-reverse-proxy" || $CI_COMMIT_BRANCH == "main"
      changes:
        - .github/workflows/env-dev--installation-uptime-kuma.yaml
        - helm-charts/env-jit/uptime-kuma/**/*
    - when: never
  tags: []
  image: alpine/k8s:1.35.2
  when: manual
  allow_failure: false

  id_tokens:
    AWS_OIDC_TOKEN:
      aud: https://gitlab.com

  variables:
    UPTIME_KUMA_VALUES: "${HELM_FOLDER}/uptime-kuma/values.yaml"

  before_script:
    - mkdir -p .aws-out

    - |
      echo "$AWS_OIDC_TOKEN" > /tmp/gitlab_oidc_token

      export AWS_ROLE_ARN="$AWS_ROLE_ARN"
      export AWS_WEB_IDENTITY_TOKEN_FILE="/tmp/gitlab_oidc_token"
      export AWS_REGION="$AWS_REGION"

      aws sts get-caller-identity

  script:
    # Step 1: Print who triggered this build
    - |
      echo "Triggered by: ${GITLAB_USER_LOGIN}"

    # Step 2: Print the caller repo name
    - |
      echo "DcentraLab Caller Repo Name is: ${CI_PROJECT_PATH}"

    # Step 3: Verify git checkout
    - |
      git rev-parse --is-inside-work-tree
      git status --porcelain || true

    # Step 4: Setup kubeconfig
    - |
      set -euo pipefail
      aws eks update-kubeconfig \
        --region "${AWS_REGION}" \
        --name "${GKE_NAME}"
      kubectl get nodes || { echo "❌ ERROR: Cannot connect to GKE cluster"; exit 1; }

    # Step 5: Ensure monitoring namespace exists
    - |
      set -euo pipefail
      if kubectl get namespace "${UPTIME_KUMA_NAMESPACE}" >/dev/null 2>&1; then
        echo "Namespace ${UPTIME_KUMA_NAMESPACE} already exists."
      else
        echo "Creating namespace ${UPTIME_KUMA_NAMESPACE}..."
        kubectl create namespace "${UPTIME_KUMA_NAMESPACE}"
        echo "✅ Namespace ${UPTIME_KUMA_NAMESPACE} created."
      fi

    # Step 6: Add Uptime Kuma Helm repo
    - |
      set -euo pipefail
      helm repo add uptime-kuma https://helm.irsigler.cloud
      helm repo update uptime-kuma
      echo "✅ Uptime Kuma Helm repo added."

    # Step 7: Install Uptime Kuma
    - |
      set -euo pipefail
      echo "Installing Uptime Kuma..."

      if ! helm upgrade --install "${UPTIME_KUMA_RELEASE_NAME}" uptime-kuma/uptime-kuma \
              --namespace "${UPTIME_KUMA_NAMESPACE}" \
              --values "${UPTIME_KUMA_VALUES}" \
              --version "${UPTIME_KUMA_CHART_VERSION}" \
              --wait --timeout=5m 2>err.log; then
        echo "❌ ERROR: Failed to install Uptime Kuma:"
        cat err.log
        exit 1
      else
        echo "✅ Uptime Kuma installed."
      fi

    # Step 8: Wait for Deployment to be ready
    - |
      set -euo pipefail
      echo "Waiting for Uptime Kuma..."

      DEPLOY_NAME=$(kubectl get deploy -n "${UPTIME_KUMA_NAMESPACE}" -l app.kubernetes.io/name=uptime-kuma -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "uptime-kuma")
      echo "Deployment name: ${DEPLOY_NAME}"

      kubectl rollout status deployment/"${DEPLOY_NAME}" -n "${UPTIME_KUMA_NAMESPACE}" --timeout=120s || {
        echo "⚠️ Uptime Kuma rollout timed out."
        kubectl get pods -n "${UPTIME_KUMA_NAMESPACE}" -l app.kubernetes.io/name=uptime-kuma -o wide
        exit 1
      }
      echo "✅ Uptime Kuma is ready."

    # Step 9: Show deployed resources summary
    - |
      set -euo pipefail

      echo "=== Uptime Kuma Pods ==="
      kubectl get pods -n "${UPTIME_KUMA_NAMESPACE}" -l app.kubernetes.io/name=uptime-kuma -o wide

      echo "=== Services ==="
      kubectl get svc -n "${UPTIME_KUMA_NAMESPACE}" -l app.kubernetes.io/name=uptime-kuma

      echo "=== PVCs ==="
      kubectl get pvc -n "${UPTIME_KUMA_NAMESPACE}" -l app.kubernetes.io/name=uptime-kuma

      echo "=== Helm Release ==="
      helm list -n "${UPTIME_KUMA_NAMESPACE}" | grep uptime-kuma

      echo ""
      echo "📋 SUMMARY:"
      echo "   Release:     ${UPTIME_KUMA_RELEASE_NAME} in ${UPTIME_KUMA_NAMESPACE}"
      echo "   Type:        Deployment (1 replica)"
      echo "   Port:        3001 (service type: ClusterIP)"
      echo "   Storage:     1Gi gp3 PVC"
      echo "   Web UI:      https://uptime.dev.cloudsmesh.be (requires IngressRoute + DNS)"
      echo ""
      echo "📋 POST-DEPLOY STEPS:"
      echo "   1. Create DNS record: uptime.dev.cloudsmesh.be → NLB (same alias)"
      echo "   2. Deploy IngressRoute: run env-jit--deploy-traefik-ingressroutes.yaml pipeline"
      echo "   3. Open Web UI → set admin password → configure Telegram notification"
      echo "   4. Add monitors for all *.dev.cloudsmesh.be endpoints"
