## .github/workflows/env-dev--installation-uptime-kuma.yaml
###### ###### ###### ###### ###### ###### ###### ###### ###### ######
### NOTE ### This GitHub Actions CI/CD pipeline job installs Uptime Kuma on the GKE cluster.
### Uptime Kuma monitors HTTP/HTTPS endpoints for all *.dev.cloudsmesh.be services.
### Built-in Telegram notifications reuse @jit_access_portal_bot.
### Web UI: https://uptime.dev.cloudsmesh.be
###### ###### ###### ###### ###### ###### ###### ###### ###### ######
name: Installation Uptime Kuma to GKE

on:
  push:
    branches:
      # - never-trigger-this-branch
      - main
    paths:
      - ".github/helm-charts/env-dev/uptime-kuma/**"
      - ".github/workflows/env-dev--installation-uptime-kuma.yaml"
  workflow_dispatch:
    inputs:
      gke_cluster_name:
        description: 'GKE Cluster Name'
        required: true
        type: string
        default: 'commit-dev-gke-cluster'

  workflow_call:
    inputs:
      gke_cluster_name:
        required: true
        type: string

permissions:
  id-token: write
  contents: read
  actions: read

env:
  ENVIRONMENT: commit-dev
  GCP_PROJECT_ID: ${{ secrets.COMMIT_HW_GCP_PROJECT_ID_B }}
  GCP_REGION: ${{ secrets.COMMIT_HW_GCP_REGION_DEV }}
  GKE_CLUSTER: ${{ github.event.inputs.gke_cluster_name || inputs.gke_cluster_name || 'commit-dev-gke-cluster' }}
  GCP_PROJECT_NUMBER: ${{ secrets.COMMIT_HW_GCP_PROJECT_B_NUMBER }}
  GCP_SERVICE_ACCOUNT: ${{ secrets.COMMIT_HW_GCP_SERVICE_ACCOUNT_PROJECT_B }}

jobs:
  installation-uptime-kuma:
    name: Install Uptime Kuma to GKE
    runs-on: ubuntu-24.04
    environment: commit-dev

    # Declare environment variables for the current job
    env:
      UPTIME_KUMA_NAMESPACE: "monitoring"
      UPTIME_KUMA_RELEASE_NAME: "uptime-kuma"
      UPTIME_KUMA_CHART: "uptime-kuma/uptime-kuma"
      UPTIME_KUMA_CHART_REPO_NAME: "uptime-kuma"
      UPTIME_KUMA_CHART_REPO_URL: "https://helm.irsigler.cloud"
      UPTIME_KUMA_CHART_VERSION: "2.24.0"
      UPTIME_KUMA_CHART_CACHE_DIR: "/tmp/uptime-kuma-chart"
      UPTIME_KUMA_CHART_DIR: "/tmp/uptime-kuma-chart/uptime-kuma"
      UPTIME_KUMA_VALUES: ".github/helm-charts/env-dev/uptime-kuma/values.yaml"
      UPTIME_KUMA_HOST: "uptime.dev.cloudsmesh.be"
      UPTIME_KUMA_SERVICE_PORT: "3001"
      TRAEFIK_NAMESPACE: "traefik-reverse-proxy"
      TRAEFIK_TLS_SECRET: "dev-cloudsmesh-be-prod-tls"
      ERROR_LOG_FILE: "err.log"
      WAIT_TIMEOUT: "5m"
      KUBECTL_TIMEOUT: "120s"

    steps:
      # Step 1: Print who triggered this build (whoami)
      - name: Who triggered this build?
        run: |
          echo "Triggered by: ${{ github.actor }}"

      # Step 2: Print the caller repo name
      - name: Print caller repo "CommIT-HW" name
        run: |
          echo "CommIT-HW Caller Repo Name is: ${{ github.repository }}"

      # Step 3: Checkout the repository code (This ensures the GitHub Actions runner has access to your repo)
      - name: Checkout Repository
        uses: actions/checkout@v5

      # Step 4: Authenticate to Google Cloud via OIDC provider without static service account keys
      - name: Authenticate to Google Cloud via OIDC
        uses: google-github-actions/auth@v3
        with:
          # GitHub Actions → GCP Workload Identity Federation exchange
          workload_identity_provider: "projects/${{ env.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
          service_account: "${{ env.GCP_SERVICE_ACCOUNT }}"

      # Step 5: Fetch GKE cluster access credentials and automatically configure local kubeconfig
      - name: Set up Cloud SDK and Configure GKE kubeconfig
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: "${{ env.GKE_CLUSTER }}"
          location: "${{ env.GCP_REGION }}"
          project_id: "${{ env.GCP_PROJECT_ID }}"

      # Step 6: Perform a smoke test to ensure direct connectivity to the private GKE control plane
      - name: Verify cluster connectivity
        run: |
          set -euo pipefail
          echo "Checking connection to GKE..."
          kubectl get nodes || { echo "❌ ERROR: Cannot connect to GKE cluster"; exit 1; }

      # Step 7: Ensure Uptime Kuma namespace exists
      - name: Ensure Uptime Kuma Namespace Exists
        run: |
          set -euo pipefail
          kubectl create namespace "${UPTIME_KUMA_NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -

      # Step 8: Verify Traefik and TLS prerequisites for the private Web UI route
      - name: Verify Traefik Route Prerequisites
        run: |
          set -euo pipefail

          if ! kubectl get crd ingressroutes.traefik.io >/dev/null 2>&1; then
            echo "❌ ERROR: Traefik IngressRoute CRD is missing. Deploy Traefik first."
            exit 1
          fi

          if ! kubectl get secret "${TRAEFIK_TLS_SECRET}" -n "${TRAEFIK_NAMESPACE}" >/dev/null 2>&1; then
            echo "❌ ERROR: Missing ${TRAEFIK_NAMESPACE}/${TRAEFIK_TLS_SECRET}."
            echo "Deploy cert-manager resources before exposing Uptime Kuma through Traefik."
            exit 1
          fi

          echo "✅ Traefik CRD and TLS secret are ready."

      # Step 9: Verify configured StorageClass exists before Helm creates the PVC
      - name: Verify Uptime Kuma StorageClass
        run: |
          set -euo pipefail
          STORAGE_CLASS=$(awk '/^[[:space:]]*storageClassName:/ {print $2; exit}' "${UPTIME_KUMA_VALUES}" | tr -d '"')

          if [ -z "${STORAGE_CLASS}" ] || [ "${STORAGE_CLASS}" = "null" ]; then
            echo "No explicit storageClassName configured. The cluster default StorageClass will be used."
            exit 0
          fi

          echo "Checking StorageClass ${STORAGE_CLASS}..."
          kubectl get storageclass "${STORAGE_CLASS}" >/dev/null
          echo "✅ StorageClass ${STORAGE_CLASS} exists."

      # Step 10: Add and update the Uptime Kuma Helm repository
      - name: Add Uptime Kuma Helm Repository
        run: |
          set -euo pipefail
          helm repo add "${UPTIME_KUMA_CHART_REPO_NAME}" "${UPTIME_KUMA_CHART_REPO_URL}"
          helm repo update "${UPTIME_KUMA_CHART_REPO_NAME}"
          helm search repo "${UPTIME_KUMA_CHART}" --versions | head -10

      # Step 11: Pull the pinned Uptime Kuma Helm chart version locally
      - name: Pull Uptime Kuma Helm Chart
        run: |
          set -euo pipefail
          mkdir -p "${UPTIME_KUMA_CHART_CACHE_DIR}"
          helm pull "${UPTIME_KUMA_CHART}" \
            --version "${UPTIME_KUMA_CHART_VERSION}" \
            --untar \
            --untardir "${UPTIME_KUMA_CHART_CACHE_DIR}"

      # Step 12: Validate Uptime Kuma chart values via Helm Lint validation rules
      - name: Helm Chart Lint Validation
        run: |
          set -euo pipefail
          echo "Linting Helm chart ${UPTIME_KUMA_CHART_DIR} with values ${UPTIME_KUMA_VALUES}"
          helm lint "${UPTIME_KUMA_CHART_DIR}" \
            -f "${UPTIME_KUMA_VALUES}"

      # Step 13: Execute Helm dry-run rendering execution test
      - name: Helm Template Dry-Run Test
        run: |
          set -euo pipefail
          echo "Testing dry-run template rendering for ${UPTIME_KUMA_CHART_DIR}"
          helm template "${UPTIME_KUMA_RELEASE_NAME}" "${UPTIME_KUMA_CHART_DIR}" \
            --namespace "${UPTIME_KUMA_NAMESPACE}" \
            -f "${UPTIME_KUMA_VALUES}"

      # Step 14: Deploy Uptime Kuma with Helm
      - name: Deploy Uptime Kuma via Helm
        run: |
          set -euo pipefail
          echo "Deploying Uptime Kuma release ${UPTIME_KUMA_RELEASE_NAME} into namespace ${UPTIME_KUMA_NAMESPACE}..."

          if ! helm upgrade --install "${UPTIME_KUMA_RELEASE_NAME}" "${UPTIME_KUMA_CHART_DIR}" \
                  --namespace "${UPTIME_KUMA_NAMESPACE}" \
                  --create-namespace \
                  -f "${UPTIME_KUMA_VALUES}" \
                  --atomic --wait --timeout="${WAIT_TIMEOUT}" 2>"${ERROR_LOG_FILE}"; then
            if grep -q "Forbidden" "${ERROR_LOG_FILE}"; then
              echo "❌ ERROR: Cannot deploy Uptime Kuma via Helm. Missing RBAC permission!"
              cat "${ERROR_LOG_FILE}"
              exit 1
            else
              echo "❌ ERROR: Failed to deploy Uptime Kuma via Helm due to an unknown error:"
              cat "${ERROR_LOG_FILE}"
              exit 1
            fi
          else
            echo "✅ Uptime Kuma successfully deployed."
          fi

      # Step 15: Wait for the Uptime Kuma Deployment rollout
      - name: Verify Uptime Kuma Rollout
        run: |
          set -euo pipefail
          DEPLOYMENT_NAME=$(kubectl get deploy -n "${UPTIME_KUMA_NAMESPACE}" \
            -l app.kubernetes.io/name=uptime-kuma \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)

          if [ -z "${DEPLOYMENT_NAME}" ]; then
            DEPLOYMENT_NAME="${UPTIME_KUMA_RELEASE_NAME}"
          fi

          echo "Waiting for Deployment ${DEPLOYMENT_NAME}..."
          kubectl rollout status deployment/"${DEPLOYMENT_NAME}" \
            -n "${UPTIME_KUMA_NAMESPACE}" \
            --timeout="${KUBECTL_TIMEOUT}"

      # Step 16: Run a smoke test against the ClusterIP Service from inside GKE
      - name: Smoke Test Uptime Kuma Service
        run: |
          set -euo pipefail
          kubectl run uptime-kuma-curl-${GITHUB_RUN_ID} \
            --namespace "${UPTIME_KUMA_NAMESPACE}" \
            --rm -i --restart=Never \
            --image=curlimages/curl:8.11.1 \
            --command -- curl -fsS \
              "http://${UPTIME_KUMA_RELEASE_NAME}.${UPTIME_KUMA_NAMESPACE}.svc.cluster.local:${UPTIME_KUMA_SERVICE_PORT}/" \
              >/dev/null

      # Step 17: Show end-of-pipeline operational status output report overview
      - name: Show Final Operational Pipeline Summary Report
        run: |
          set -euo pipefail
          echo "=== Uptime Kuma Pods ==="
          kubectl get pods -n "${UPTIME_KUMA_NAMESPACE}" -l app.kubernetes.io/name=uptime-kuma -o wide

          echo "=== Uptime Kuma Services ==="
          kubectl get svc -n "${UPTIME_KUMA_NAMESPACE}" -l app.kubernetes.io/name=uptime-kuma -o wide

          echo "=== Uptime Kuma PVCs ==="
          kubectl get pvc -n "${UPTIME_KUMA_NAMESPACE}" -l app.kubernetes.io/name=uptime-kuma -o wide || true

          echo "=== Uptime Kuma Helm Release ==="
          helm list -n "${UPTIME_KUMA_NAMESPACE}" | grep "${UPTIME_KUMA_RELEASE_NAME}"

          echo "=== Uptime Kuma Traefik IngressRoute ==="
          kubectl get ingressroute uptime-kuma -n "${TRAEFIK_NAMESPACE}" -o wide || true

          echo ""
          echo "Summary:"
          echo "  Release: ${UPTIME_KUMA_RELEASE_NAME}"
          echo "  Namespace: ${UPTIME_KUMA_NAMESPACE}"
          echo "  Service port: ${UPTIME_KUMA_SERVICE_PORT}"
          echo "  Web UI: https://${UPTIME_KUMA_HOST}"
          echo ""
          echo "Post-deploy:"
          echo "  1. Deploy or refresh Traefik IngressRoutes if uptime-kuma route is missing."
          echo "  2. Open https://${UPTIME_KUMA_HOST} through Twingate."
          echo "  3. Create the initial admin user and configure monitors/notifications in the UI."
