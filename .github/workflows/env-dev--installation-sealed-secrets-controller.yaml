## .github/workflows/env-dev--installation-sealed-secrets-controller.yaml
name: Installation Sealed-Secrets Controller to GKE

on:
  push:
    branches:
      # - never-trigger-this-branch
      - main
  workflow_dispatch:
    inputs:
      gke_cluster_name:
        description: 'GKE Cluster Name'
        required: true
        type: string
        default: 'commit-dev-gke-cluster'

  workflow_call:
    inputs:
      gke_cluster_name:
        required: true
        type: string

permissions:
  id-token: write
  contents: read
  actions: read

env:
  ENVIRONMENT: commit-dev
  GCP_PROJECT_ID: ${{ secrets.COMMIT_HW_GCP_PROJECT_ID_B }} 
  GCP_REGION: ${{ secrets.COMMIT_HW_GCP_REGION_DEV }} 
  GKE_CLUSTER: ${{ github.event.inputs.gke_cluster_name || 'commit-dev-gke-cluster' }}
  GCP_PROJECT_NUMBER: ${{ secrets.COMMIT_HW_GCP_PROJECT_B_NUMBER }} 
  GCP_SERVICE_ACCOUNT: ${{ secrets.COMMIT_HW_GCP_SERVICE_ACCOUNT_PROJECT_B }} 

jobs:
  installation-sealed-secrets-controller:  
    name: Install Sealed-Secrets Controller to GKE
    runs-on: ubuntu-24.04
    # This explicit binding allows access to the environment-scoped secrets
    environment: commit-dev

    # Declare environment variables for the current job
    env:
      HELM_CHART_VERSION: "2.17.3" # https://bitnami-labs.github.io/sealed-secrets/index.yaml
      CONTROLLER_VERSION: "0.30.0" # https://github.com/bitnami-labs/sealed-secrets/releases
      HELM_REPO_NAME: "sealed-secrets"
      HELM_REPO_URL: "https://bitnami-labs.github.io/sealed-secrets"
      ERROR_LOG_FILE: "err.log"

    steps:
      # Step 1: Print who triggered this build (whoami)
      - name: Who triggered this build?
        run: |
          echo "Triggered by: ${{ github.actor }}"

      # Step 2: Print the caller repo name
      - name: Print caller repo "CommIT-HW" name
        run: |
          echo "CommIT-HW Caller Repo Name is: ${{ github.repository }}"

      # Step 3: Checkout the repository code (This ensures the GitHub Actions runner has access to your repo)
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2

      # Step 4: Authenticate to Google Cloud via OIDC provider without static service account keys
      - name: Authenticate to Google Cloud via OIDC
        uses: google-github-actions/auth@v2.1.3
        with:
          # Construct the provider string inside the step using standard bash variable notation
          workload_identity_provider: "projects/${{ env.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
          service_account: "${{ env.GCP_SERVICE_ACCOUNT }}"

      # Step 5: Fetch GKE cluster access credentials and automatically configure local kubeconfig
      - name: Set up Cloud SDK and Configure kubeconfig
        uses: google-github-actions/get-gke-credentials@v2.1.2
        with:
          cluster_name: "${{ env.GKE_CLUSTER }}"
          location: "${{ env.GCP_REGION }}"
          project_id: "${{ env.GCP_PROJECT_ID }}"

      # Step 6: Perform a smoke test to ensure direct connectivity to the private GKE control plane
      - name: Verify cluster connectivity
        run: |
          echo "Checking connection to GKE..."
          kubectl get nodes || { echo "❌ ERROR: Cannot connect to GKE cluster"; exit 1; }

      # Step 7: Check and Install Sealed-Secrets Controller via Helm
      - name: Check and Install Sealed-Secrets Controller via Helm
        run: |
          echo "::group::Checking installed Sealed-Secrets Controller"
          if kubectl get deploy sealed-secrets -n kube-system >/dev/null 2>&1; then
            echo "✅ Sealed-Secrets Controller is already installed"
            exit 0
          fi
          echo "::endgroup::"

          echo "⚠️ Sealed-Secrets Controller does not exist."

          echo "::group::⚠️ Installing Sealed-Secrets Controller via Helm..."
          helm repo add "${HELM_REPO_NAME}" "${HELM_REPO_URL}"
          helm repo update

          if ! helm upgrade --install sealed-secrets "${HELM_REPO_NAME}/sealed-secrets" \
                  --namespace kube-system \
                  --create-namespace \
                  --version "${HELM_CHART_VERSION}" \
                  --set image.tag="${CONTROLLER_VERSION}" 2>"${ERROR_LOG_FILE}"; then
            if grep -q "Forbidden" "${ERROR_LOG_FILE}"; then
              echo "❌ ERROR: Cannot install Sealed-Secrets Controller via Helm. Missing RBAC permission!"
              cat "${ERROR_LOG_FILE}"
              exit 1
            else
              echo "❌ ERROR: Failed to install Sealed-Secrets Controller via Helm due to an unknown error:"
              cat "${ERROR_LOG_FILE}"
              exit 1
            fi
          else
            echo "✅ Sealed-Secrets Controller successfully installed via Helm."
          fi
          
          echo "::endgroup::"