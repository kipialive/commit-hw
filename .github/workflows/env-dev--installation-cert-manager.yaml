      # - name: Verify Certificate Issue Status
      #   run: |
      #     set -euo pipefail
      #     CERT_NAME=$(awk '/^certificate:/{found=1} found && /^  name:/{print $2; exit}' "${CHART_VALUES}")
      #     CERT_NS=$(awk '/^certificate:/{found=1} found && /^  namespace:/{print $2; exit}' "${CHART_VALUES}")
      #     echo "Waiting for Certificate ${CERT_NAME} activation in namespace ${CERT_NS}..."

      #     READY="Unknown"
