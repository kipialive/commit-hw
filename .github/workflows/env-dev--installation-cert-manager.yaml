      #       echo "WARNING: Certificate issue loop timed out. Inspection output:"
      #       kubectl describe certificate "${CERT_NAME}" -n "${CERT_NS}"
      #     fi

      # Step 17: Show end-of-pipeline operational status output report overview
      - name: Show Final Operational Pipeline Summary Report
        run: |
          set -euo pipefail
          echo "=== ClusterIssuers ==="
          kubectl get clusterissuers -o wide

          echo "=== Certificates ==="
          kubectl get certificates --all-namespaces -o wide

          echo "=== Generated TLS K8s Secrets ==="
          kubectl get secrets --all-namespaces --field-selector type=kubernetes.io/tls -o wide 2>/dev/null || true