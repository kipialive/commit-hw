## .github/workflows/env-dev--installation-cert-manager.yaml
name: Installation Cert-Manager to GKE

on:
  push:
    branches:
      # - never-trigger-this-branch
      - main
  workflow_dispatch:
    inputs:
      gke_cluster_name:
        description: 'GKE Cluster Name'
        required: true
        type: string
        default: 'commit-dev-gke-cluster'

  workflow_call:
    inputs:
      gke_cluster_name:
        required: true
        type: string

permissions:
  id-token: write
  contents: read
  actions: read

env:
  ENVIRONMENT: commit-dev
  GCP_PROJECT_ID: ${{ secrets.COMMIT_HW_GCP_PROJECT_ID_B }} 
  GCP_REGION: ${{ secrets.COMMIT_HW_GCP_REGION_DEV }} 
  GKE_CLUSTER: ${{ github.event.inputs.gke_cluster_name || 'commit-dev-gke-cluster' }}
  GCP_PROJECT_NUMBER: ${{ secrets.COMMIT_HW_GCP_PROJECT_B_NUMBER }} 
  GCP_SERVICE_ACCOUNT: ${{ secrets.COMMIT_HW_GCP_SERVICE_ACCOUNT_PROJECT_B }} 

jobs:
  installation-cert-manager:  
    name: Install Cert-Manager to GKE
    runs-on: ubuntu-24.04
    environment: commit-dev

    # Declare environment variables for the current job
    env:
      CERT_MANAGER_NAMESPACE: "cert-manager"
      HELM_FOLDER: ".github/helm-charts/env-dev"
      CERT_MANAGER_CHART_VERSION: "1.21.0" # https://artifacthub.io/packages/helm/cert-manager/cert-manager
      CERT_MANAGER_RELEASE_NAME: "cert-manager-resources"
      ERROR_LOG_FILE: "err.log"
      CHART_DIR: ".github/helm-charts/env-dev/cert-manager"
      CHART_VALUES: ".github/helm-charts/env-dev/cert-manager/values.yaml"
      WAIT_TIMEOUT: "5m"
      KUBECTL_TIMEOUT: "120s"

    steps:
      # Step 1: Print who triggered this build (whoami)
      - name: Who triggered this build?
        run: |
          echo "Triggered by: ${{ github.actor }}"

      # Step 2: Print the caller repo name
      - name: Print caller repo "CommIT-HW" name
        run: |
          echo "CommIT-HW Caller Repo Name is: ${{ github.repository }}"

      # Step 3: Checkout the repository code (This ensures the GitHub Actions runner has access to your repo)
      - name: Checkout Repository
        uses: actions/checkout@v5

      # Step 4: Authenticate to Google Cloud via OIDC provider without static service account keys
      - name: Authenticate to Google Cloud via OIDC
        uses: google-github-actions/auth@v3
        with:
          # GitHub Actions → GCP Workload Identity Federation exchange
          workload_identity_provider: "projects/${{ env.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
          service_account: "${{ env.GCP_SERVICE_ACCOUNT }}"

      # Step 5: Fetch GKE cluster access credentials and automatically configure local kubeconfig
      - name: Set up Cloud SDK and Configure kubeconfig
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: "${{ env.GKE_CLUSTER }}"
          location: "${{ env.GCP_REGION }}"
          project_id: "${{ env.GCP_PROJECT_ID }}"

      # Step 6: Perform a smoke test to ensure direct connectivity to the private GKE control plane
      - name: Verify cluster connectivity
        run: |
          echo "Checking connection to GKE..."
          kubectl get nodes || { echo "❌ ERROR: Cannot connect to GKE cluster"; exit 1; }

      # Step 7: Check and Deploy cert-manager using Helm to the Kubernetes cluster
      - name: Check and Deploy cert-manager via Helm
        run: |
          echo "Checking installed cert-manager..."
          if kubectl get deployment cert-manager -n "${CERT_MANAGER_NAMESPACE}" >/dev/null 2>&1; then
            echo "✅ cert-manager is already installed. Upgrading configuration..."
          else
            echo "⚠️ cert-manager does not exist. Installing via Helm..."
          fi

          # Deploying cleanly via OIDC/OCI registry instead of legacy HTTP helm repositories
          if ! helm upgrade --install cert-manager oci://quay.io/jetstack/charts/cert-manager \
                  --namespace "${CERT_MANAGER_NAMESPACE}" \
                  --create-namespace \
                  --version "${CERT_MANAGER_CHART_VERSION}" \
                  --set crds.enabled=true \
                  --set 'extraArgs={--dns01-recursive-nameservers=8.8.8.8:53\,1.1.1.1:53,--dns01-recursive-nameservers-only=true}' \
                  --wait --timeout="${WAIT_TIMEOUT}" 2>"${ERROR_LOG_FILE}"; then
            if grep -q "Forbidden" "${ERROR_LOG_FILE}"; then
              echo "❌ ERROR: Cannot install cert-manager via Helm. Missing RBAC permission!"
              cat "${ERROR_LOG_FILE}"
              exit 1
            else
              echo "❌ ERROR: Failed to install cert-manager via Helm due to an unknown error:"
              cat "${ERROR_LOG_FILE}"
              exit 1
            fi
          else
            echo "✅ cert-manager successfully deployed via OCI Helm chart."
          fi
      
      # Step 8: Wait and verify cert-manager pods readiness status
      - name: Wait for cert-manager Core Components
        run: |
          set -euo pipefail

          echo "Waiting for cert-manager controller pod to be ready..."
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/name=cert-manager \
            -n "${CERT_MANAGER_NAMESPACE}" --timeout="${KUBECTL_TIMEOUT}"

          echo "Waiting for cert-manager webhook pod to be ready..."
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/name=webhook \
            -n "${CERT_MANAGER_NAMESPACE}" --timeout="${KUBECTL_TIMEOUT}"

          echo "Waiting for cert-manager cainjector pod to be ready..."
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/name=cainjector \
            -n "${CERT_MANAGER_NAMESPACE}" --timeout="${KUBECTL_TIMEOUT}"

      # Step 9: Verify cert-manager Custom Resource Definitions API responsiveness
      - name: Verify cert-manager CRD API Readiness
        run: |
          set -euo pipefail
          echo "Verifying cert-manager API readiness..."
          
          if kubectl get crd certificates.cert-manager.io >/dev/null 2>&1 && \
             kubectl get crd clusterissuers.cert-manager.io >/dev/null 2>&1 && \
             kubectl get crd issuers.cert-manager.io >/dev/null 2>&1; then
            echo "✅ cert-manager CRDs are installed successfully."
          else
            echo "❌ ERROR: cert-manager CRDs are NOT detected in the API server!"
            exit 1
          fi

      # Step 10: Show core resources overview summary
      - name: Display cert-manager Core Components Summary
        run: |
          set -euo pipefail
          echo "Summary of cert-manager resources in namespace ${CERT_MANAGER_NAMESPACE}:"
          kubectl -n "${CERT_MANAGER_NAMESPACE}" get pods,svc,deploy -o wide

      # Step 11: Auto-detect target certificate namespace and ensure it exists
      - name: Ensure Certificate Target Namespace Exists
        run: |
          set -euo pipefail
          CERT_NS=$(grep 'namespace:' "${CHART_VALUES}" | grep -v '#' | head -1 | awk '{print $2}')
          echo "Certificate target namespace parsed: ${CERT_NS}"

          if kubectl get namespace "${CERT_NS}" >/dev/null 2>&1; then
            echo "Namespace ${CERT_NS} already exists."
          else
            echo "Creating namespace ${CERT_NS}..."
            kubectl create namespace "${CERT_NS}"
          fi

      # Step 12: Validate local wrapper chart via Helm Lint validation rules
      - name: Helm Chart Lint Validation
        run: |
          set -euo pipefail
          echo "Linting Helm chart directory: ${CHART_DIR}"
          helm lint "${CHART_DIR}" -f "${CHART_VALUES}"

      # Step 13: Execute Helm dry-run rendering execution test
      - name: Helm Template Dry-Run Test
        run: |
          set -euo pipefail
          echo "Testing dry-run template rendering from: ${CHART_DIR}"
          helm template "${CERT_MANAGER_RELEASE_NAME}" "${CHART_DIR}" \
            -n "${CERT_MANAGER_NAMESPACE}" \
            -f "${CHART_VALUES}"

      # Step 14: Deploy custom local wrapper application chart containing ClusterIssuer and Certificate
      - name: Deploy Custom Cert-Manager Wrapper Chart Resources
        run: |
          set -euo pipefail
          echo "Deploying local wrapper resources from: ${CHART_DIR}"

          if ! helm upgrade --install "${CERT_MANAGER_RELEASE_NAME}" "${CHART_DIR}" \
                  --namespace "${CERT_MANAGER_NAMESPACE}" \
                  --create-namespace \
                  -f "${CHART_VALUES}" 2>"${ERROR_LOG_FILE}"; then
            if grep -q "Forbidden" "${ERROR_LOG_FILE}"; then
              echo "❌ ERROR: Cannot deploy cert-manager wrapper chart. Missing RBAC permission!"
              cat "${ERROR_LOG_FILE}"
              exit 1
            else
              echo "❌ ERROR: Failed to deploy wrapper resources due to an unknown error:"
              cat "${ERROR_LOG_FILE}"
              exit 1
            fi
          else
            echo "✅ Custom cert-manager resources (ClusterIssuer + Certificate) applied."
          fi

      
      # # ==============================================================================
      # # COMMENTED OUT: Validation and polling loops for fast execution
      # # ==============================================================================


      # # Step 15: Run polling validation check until ClusterIssuer moves to active ready state
      # - name: Verify ClusterIssuer Activation Status
      #   run: |
      #     set -euo pipefail
      #     ISSUER_NAME=$(awk '/^clusterIssuer:/{found=1} found && /^  name:/{print $2; exit}' "${CHART_VALUES}")
